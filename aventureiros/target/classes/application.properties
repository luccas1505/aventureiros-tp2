# ============================================================
# DataSource - PostgreSQL legado (imagem Docker do TP2)
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate
# IMPORTANTE: ddl-auto=validate garante que o banco existente
# seja usado sem nenhuma alteração estrutural.
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Schema padrão NÃO é alterado — as entidades declaram @Table(schema="audit")
spring.jpa.properties.hibernate.default_schema=

# Exibe SQL formatado nos logs
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
